# Default values for Traffinator on k3s.
# Tuned for a homelab single-node cluster: Traefik ingress + local-path storage.

nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Images
# -----------------------------------------------------------------------------
# Images are published to GHCR by .github/workflows/build-images.yml. The
# workflow tags each push with: the short git SHA, the branch name, `latest`
# (on main), and a semver (on `v*` git tags). For a multi-node cluster, pin to
# an immutable tag (a git SHA or a version) rather than `latest`.
#   tag "" below falls back to the chart appVersion.
image:
  pullPolicy: IfNotPresent
# Required if the GHCR packages are PRIVATE. Create the secret first:
#   kubectl -n <ns> create secret docker-registry ghcr \
#     --docker-server=ghcr.io --docker-username=<github-user> \
#     --docker-password=<PAT-with-read:packages>
# then list it here: [{ name: ghcr }]. Not needed if the packages are public.
imagePullSecrets: []

backend:
  image:
    repository: ghcr.io/mattyo161/traffinator-backend
    tag: ""   # "" -> chart appVersion
  replicas: 1
  # Keep at 1 unless you move DB migrations out of the entrypoint into a Job:
  # the entrypoint runs `migrate` on start, which shouldn't race across pods.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Non-secret env (rendered into a ConfigMap). Add keys here freely.
  env:
    DJANGO_DEBUG: "0"
    ANALYSIS_MAX_WORKERS: "8"
    # "1" enforces per-tier analyze limits (commute.tiers). On now that the SPA
    # renders the limits matrix (issue #32).
    TIER_ENFORCEMENT: "1"
    # Rate limits protecting the paid Google endpoints (see commute.throttles).
    THROTTLE_ANALYZE_ANON: "5/hour"
    THROTTLE_ANALYZE_USER: "60/hour"
    THROTTLE_LOOKUP_ANON: "30/hour"
    THROTTLE_LOOKUP_USER: "120/hour"
    THROTTLE_GOOGLE_GLOBAL: "2000/day"
  # Prometheus scraping of the backend /metrics endpoint. Enable the
  # ServiceMonitor only if the Prometheus Operator (kube-prometheus-stack) CRDs
  # are installed in the cluster.
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
      # Scrape interval; "" inherits the Prometheus default.
      interval: ""
      scrapeTimeout: ""
      # Extra labels so a Prometheus with a release selector picks this up
      # (e.g. release: kube-prometheus-stack).
      labels: {}

frontend:
  image:
    repository: ghcr.io/mattyo161/traffinator-frontend
    tag: ""   # "" -> chart appVersion
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# -----------------------------------------------------------------------------
# Secrets — API keys and credentials.
# Leave the Google Maps key blank to configure it later via the in-app setup
# screen (it persists in the DB on the PVC). ENV always wins if set here.
# DJANGO_SECRET_KEY and the Postgres password are auto-generated and preserved
# across upgrades if left blank (via a Secret lookup). Provide existingSecret
# to manage all of these yourself instead.
# -----------------------------------------------------------------------------
secrets:
  existingSecret: ""        # if set, the chart won't create/own a Secret
  googleMapsApiKey: ""
  googleOauthClientId: ""   # enables Google sign-in (also exposed to the SPA)
  appleOauthClientId: ""    # leave blank; Apple sign-in is scaffolded/disabled
  openRouteServiceApiKey: "" # blank -> map routing falls back to public OSRM
  djangoSecretKey: ""       # blank -> generated & preserved across upgrades

# -----------------------------------------------------------------------------
# PostgreSQL — choose a provider with postgres.mode (cnpg | bundled | external).
# -----------------------------------------------------------------------------
postgres:
  # Database provider:
  #   cnpg     - CloudNativePG operator Cluster (DEFAULT). Idiomatic on k8s:
  #              HA, backups, metrics, and operand images that already bundle
  #              pgaudit/pg_stat_statements/contrib. REQUIRES the CNPG operator
  #              to be installed in the cluster (see chart README).
  #   bundled  - simple in-chart Postgres Deployment + PVC (no operator needed).
  #   external - bring your own DATABASE_URL (Supabase / RDS / Aurora / ...).
  mode: cnpg
  database: commute
  username: commute

  # --- mode: cnpg --------------------------------------------------------------
  cnpg:
    instances: 2                 # 1 = single, 2+ = HA with streaming replicas
    imageName: ""                # optional: pin a CNPG operand image
    storage:
      size: 5Gi
      storageClass: ""           # "" = cluster default; set e.g. longhorn
    superuserAccess: false       # creates <cluster>-superuser secret (ops use)
    monitoring:
      enablePodMonitor: false    # true with kube-prometheus-stack for DB metrics
    # pgAudit session auditing. Records go to the Postgres log (stdout) and ride
    # the cluster's log pipeline (Vector -> Loki/BetterStack on the homelab).
    pgaudit:
      enabled: false
      log: "write,ddl,role"      # audited statement classes (pgaudit.log)
      logCatalog: false          # pgaudit.log_catalog (off avoids noisy catalog reads)
    # WAL archiving + base backups via the Barman Cloud Plugin (enables PITR).
    # This only wires the plugin onto the Cluster; the ObjectStore,
    # ScheduledBackup, and off-site copy are managed outside the chart (homelab).
    # Requires an existing barmancloud.cnpg.io/ObjectStore named below.
    backup:
      enabled: false
      objectStoreName: ""        # name of the ObjectStore to archive WAL/backups to
    parameters: {}               # extra postgresql.conf parameters
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  # --- mode: bundled -----------------------------------------------------------
  bundled:
    image:
      repository: postgres
      tag: "16-alpine"
    password: ""                 # blank -> generated & preserved across upgrades
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""           # "" = cluster default (local-path on k3s)
      accessMode: ReadWriteOnce

# --- mode: external ------------------------------------------------------------
externalDatabase:
  # The target must have the `cube` and `earthdistance` extensions available.
  # Provide the connection EITHER as a plain URL here, OR (preferred — keeps the
  # password out of values/this chart's Secret) by pointing at an existing
  # Secret that already holds a connection URL (e.g. a CNPG `<cluster>-app`
  # Secret's `uri` key).
  url: ""
  existingSecret: ""
  existingSecretKey: "uri"

# -----------------------------------------------------------------------------
# Ingress (k3s ships Traefik as the default IngressClass)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  host: traffinator.local
  annotations: {}
  tls:
    enabled: false
    secretName: traffinator-tls

service:
  # ClusterIP for all internal services; ingress is the external entrypoint.
  type: ClusterIP

podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

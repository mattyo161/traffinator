# Homelab overlay for the mattyo161/homelab k3s cluster.
#   helm upgrade --install traffinator deploy/helm/traffinator \
#     -n traffinator --create-namespace -f deploy/helm/traffinator/values-homelab.yaml
#
# Matches the cluster's conventions: Longhorn storage, Traefik + cert-manager
# under *.oue.home. See docs/runbooks/postgres-operations.md for the CNPG path.

# Pin to an immutable tag once CI has published images to GHCR (a git SHA from
# the build-images workflow, or a v1.x.x release tag). "" = chart appVersion.
backend:
  image: { tag: "" }
frontend:
  image: { tag: "" }

# Uncomment if the GHCR packages are private (see chart README for the secret):
# imagePullSecrets:
#   - name: ghcr

ingress:
  enabled: true
  className: traefik
  host: traffinator.oue.home
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  tls:
    enabled: true
    secretName: traffinator-tls

# --- Database -----------------------------------------------------------------
# CloudNativePG (chart default). Requires the CNPG operator installed in the
# cluster (ArgoCD/operator session). Storage on Longhorn; DB metrics into the
# existing kube-prometheus-stack via a PodMonitor.
postgres:
  mode: cnpg
  cnpg:
    instances: 2
    storage:
      size: 5Gi
      storageClass: longhorn
    monitoring:
      enablePodMonitor: true
    # superuserAccess: true   # enable if you need admin ops (e.g. schema-remap restores)

# No operator yet? Fall back to the in-chart Postgres on Longhorn:
# postgres:
#   mode: bundled
#   bundled:
#     persistence: { enabled: true, storageClass: longhorn, size: 5Gi }

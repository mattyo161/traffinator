apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "traffinator.frontend.fullname" . }}-nginx
  labels:
    {{- include "traffinator.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  # Overrides the image's baked default.conf so /api proxies to the in-cluster
  # backend Service (release-prefixed), not the compose-time "backend" host.
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://{{ include "traffinator.backend.fullname" . }}:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        location / {
            try_files $uri /index.html;
        }
    }

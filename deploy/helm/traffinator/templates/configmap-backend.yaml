apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "traffinator.backend.fullname" . }}-env
  labels:
    {{- include "traffinator.labels" . | nindent 4 }}
data:
  DJANGO_DEBUG: {{ .Values.backend.env.DJANGO_DEBUG | quote }}
  ANALYSIS_MAX_WORKERS: {{ .Values.backend.env.ANALYSIS_MAX_WORKERS | quote }}

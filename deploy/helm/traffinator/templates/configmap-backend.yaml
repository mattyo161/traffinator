apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "traffinator.backend.fullname" . }}-env
  labels:
    {{- include "traffinator.labels" . | nindent 4 }}
data:
  # Renders every key under backend.env, so adding a non-secret env var is just
  # a values change (e.g. the THROTTLE_* rate limits).
  {{- range $key, $value := .Values.backend.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

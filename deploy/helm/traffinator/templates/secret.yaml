{{- if not .Values.secrets.existingSecret -}}
{{- $name := include "traffinator.fullname" . -}}
{{- /* Preserve generated values across upgrades by reading the existing Secret. */ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}

{{- /* Django secret key */ -}}
{{- $django := .Values.secrets.djangoSecretKey -}}
{{- if not $django -}}
  {{- if and $existing (index $existing.data "DJANGO_SECRET_KEY") -}}
    {{- $django = index $existing.data "DJANGO_SECRET_KEY" | b64dec -}}
  {{- else -}}
    {{- $django = randAlphaNum 50 -}}
  {{- end -}}
{{- end -}}

{{- $bundled := eq .Values.postgres.mode "bundled" -}}
{{- /* Postgres password (bundled mode only) — generated & preserved on upgrade */ -}}
{{- $pgPass := .Values.postgres.bundled.password -}}
{{- if and $bundled (not $pgPass) -}}
  {{- if and $existing (index $existing.data "POSTGRES_PASSWORD") -}}
    {{- $pgPass = index $existing.data "POSTGRES_PASSWORD" | b64dec -}}
  {{- else -}}
    {{- $pgPass = randAlphaNum 24 -}}
  {{- end -}}
{{- end -}}

{{- /* DATABASE_URL is stored in this Secret only for:
       - bundled mode (built from the generated password), and
       - external mode with a plain url (no existingSecret).
       For cnpg mode and external+existingSecret, the backend reads the URL
       directly from the relevant Secret (see backend.yaml). */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "traffinator.labels" . | nindent 4 }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ $django | quote }}
  {{- if $bundled }}
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.postgres.username $pgPass (include "traffinator.postgres.fullname" .) .Values.postgres.database | quote }}
  {{- else if and (eq .Values.postgres.mode "external") .Values.externalDatabase.url (not .Values.externalDatabase.existingSecret) }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- end }}
  GOOGLE_MAPS_API_KEY: {{ .Values.secrets.googleMapsApiKey | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.secrets.googleOauthClientId | quote }}
  APPLE_OAUTH_CLIENT_ID: {{ .Values.secrets.appleOauthClientId | quote }}
  OPENROUTESERVICE_API_KEY: {{ .Values.secrets.openRouteServiceApiKey | quote }}
{{- end -}}

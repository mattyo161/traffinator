name: CI

# Pre-merge quality gates. Runs on PRs into main (and on main itself so the
# status-check contexts stay registered for branch protection).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Debian image ships contrib (cube/earthdistance); POSTGRES_USER is a
        # superuser so the migrations' CREATE EXTENSION works.
        image: postgres:16
        env:
          POSTGRES_DB: commute
          POSTGRES_USER: commute
          POSTGRES_PASSWORD: commute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commute"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Django tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://commute:commute@localhost:5432/commute
          DJANGO_SECRET_KEY: ci-not-secret
        run: python manage.py test commute -v 1

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test
      - name: Build (catches JSX/compile errors)
        working-directory: frontend
        run: npm run build

  chart-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint
        run: helm lint deploy/helm/traffinator
      - name: Render templates (cnpg + bundled)
        run: |
          helm template tf deploy/helm/traffinator > /dev/null
          helm template tf deploy/helm/traffinator --set postgres.mode=bundled > /dev/null

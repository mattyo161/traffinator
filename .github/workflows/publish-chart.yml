name: Publish Helm chart

# Packages the Helm chart at deploy/helm/traffinator and pushes it to GHCR as an
# OCI artifact:  ghcr.io/<owner>/charts/traffinator:<version>
#
# Version resolution:
#   - Called from release.yml with `version` = the app release version, the chart
#     is packaged with --version/--app-version = that version, so chart and app
#     track together on every release.
#   - On a chart-only push to main (or manual dispatch without a version), the
#     Chart.yaml `version:` is used.
#
# OCI tags are immutable, so the job skips (with a warning) if that version is
# already published. Auth is GITHUB_TOKEN with packages: write (same org).
on:
  workflow_call:
    inputs:
      version:
        description: "Version to publish the chart as (e.g. 0.3.0). Empty = Chart.yaml version."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish the chart as. Empty = Chart.yaml version."
        type: string
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "deploy/helm/traffinator/**"
      - ".github/workflows/publish-chart.yml"

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts
      CHART_DIR: deploy/helm/traffinator
      INPUT_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Resolve version (release input wins; else Chart.yaml)
        id: chart
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
            echo "from_release=true" >> "$GITHUB_OUTPUT"
          else
            version="$(awk '/^version:/{print $2; exit}' "$CHART_DIR/Chart.yaml")"
            echo "from_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing chart version: $version"

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Skip if this version is already published (immutable tags)
        id: exists
        run: |
          if helm show chart "$OCI_REPO/traffinator" --version "${{ steps.chart.outputs.version }}" >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::warning::traffinator chart ${{ steps.chart.outputs.version }} already exists in GHCR; nothing to publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and push chart
        if: steps.exists.outputs.already == 'false'
        env:
          V: ${{ steps.chart.outputs.version }}
        run: |
          if [ "${{ steps.chart.outputs.from_release }}" = "true" ]; then
            # Release: pin both chart version and appVersion to the app version.
            helm package "$CHART_DIR" --version "$V" --app-version "$V"
          else
            # Chart-only / manual: use Chart.yaml's version and appVersion.
            helm package "$CHART_DIR"
          fi
          helm push "traffinator-${V}.tgz" "$OCI_REPO"
          echo "Published $OCI_REPO/traffinator:${V}"

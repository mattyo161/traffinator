name: Build and push images

# Builds the backend and frontend images and pushes them to GitHub Container
# Registry (GHCR) so the k3s cluster can pull the same image on every node.
#
# This is a *reusable* workflow: release.yml calls it after semantic-release so
# the published images carry the computed version. It can also be run manually
# (workflow_dispatch) to rebuild from the current ref.
on:
  workflow_call:
    inputs:
      version:
        description: "Semantic version to also tag images with (e.g. 1.2.3). Empty = only sha/latest."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version tag to apply to the images."
        type: string
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name is lowercased automatically (e.g. ghcr.io/mattyo161/traffinator-backend)
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/traffinator-${{ matrix.name }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=traffinator-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=traffinator-${{ matrix.name }}
